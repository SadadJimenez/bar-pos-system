<svg width="512" height="512" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FDF0A6" />
            <stop offset="30%" stop-color="#D4AF37" />
            <stop offset="70%" stop-color="#AA7F1E" />
            <stop offset="100%" stop-color="#6D4C00" />
        </linearGradient>
        <path id="curveLeft" d="M35 110 Q35 50 100 50" />
        <path id="curveRight" d="M100 50 Q165 50 165 110" />
    </defs>

    <!-- Oval/Capsule Border -->
    <rect x="20" y="20" width="160" height="200" rx="80" stroke="url(#goldGradient)" stroke-width="3" />

    <!-- Bottom Circle -->
    <circle cx="100" cy="195" r="30" stroke="url(#goldGradient)" stroke-width="3" />
    <circle cx="100" cy="195" r="22" stroke="url(#goldGradient)" stroke-width="1.5" stroke-dasharray="3 3" />

    <!-- Top Glass and Bottle -->
    <g stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Bottle -->
        <path d="M125 40 L125 55 L135 65 L135 120 L115 120 L115 65 L125 55" />
        <rect x="119" y="80" width="12" height="25" rx="1" stroke-width="2" />

        <!-- Glass -->
        <path d="M75 100 L125 100" stroke-width="2" /> <!-- Table line -->
        <path d="M100 80 Q100 120 85 120 L80 120 Q65 120 65 80 Z" />
        <path d="M82.5 120 L82.5 135" />
        <path d="M70 135 L95 135" />
    </g>

    <!-- "AM" Text -->
    <text x="100" y="145" fill="url(#goldGradient)" font-size="75" font-weight="900" text-anchor="middle" font-family="serif" style="letter-spacing: -6px;">
        AM
    </text>

    <!-- "LICORES" Text -->
    <text x="100" y="170" fill="url(#goldGradient)" font-size="22" font-weight="900" text-anchor="middle" font-family="Outfit, sans-serif" style="letter-spacing: 5px;">
        LICORES
    </text>

    <!-- Small deco lines -->
    <text fill="url(#goldGradient)" font-size="12" font-weight="900" font-family="Outfit, sans-serif" letter-spacing="2px">
        <textPath xlink:href="#curveLeft" startOffset="20%">DESDE</textPath>
    </text>
    <text fill="url(#goldGradient)" font-size="12" font-weight="900" font-family="Outfit, sans-serif" letter-spacing="2px">
        <textPath xlink:href="#curveRight" startOffset="45%">2025</textPath>
    </text>

    <!-- Small deco lines -->
    <line x1="100" y1="130" x2="100" y2="135" stroke="url(#goldGradient)" stroke-width="1" />
</svg>
